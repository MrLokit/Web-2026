<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Авторизация</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../style.css">
</head>
<body>                

<div class="login">
    <div class="login__header">
        <h1>Войти</h1>
        <img src="../img/login_photo.png" alt="login photo" class="login__photo">
    </div>

    <div class="login__form">
        <form>
            <p>Электропочта</p>
            <input type="text" name="mail" class="login__input">
            <p class="login__input-description">Введите электропочту в формате ****@***.**</p>

            <p>Пароль</p>
            <input type="password" name="password" class="login__input">
            
            <button class="login__button">Продолжить</button>
        </form>
    </div>
</div>

</body>
</html>
