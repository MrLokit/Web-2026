<!DOCTYPE html>
<html lang="ru">
    <head>
        <title>Профиль</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="../style.css">
    </head>
    <body>
        <div class="profile-page">
            <nav>
                <a href="../home/index.html" class="menu__item"><img src="../img/icon_home.png" alt="Home"></a>
                <a href="../profile/index.html" class="menu__item"><img src="../img/icon_profile_active.png" alt="Profile"></a>
                <a href="#" class="menu__item"><img src="../img/icon_add.png" alt="Adds"></a>
            </nav>
            <div class="profile">
                <img src="../img/avatar1.png" alt="Profile photo" class="profile__photo" style="width: 123px; height: 123px;">
                <h1 class="profile__name">Ваня Денисов</h1>
                <p class="profile__description">Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</p>
                <div class="profile__post-counter">   
                    <img src="../img/picture-icon.png" alt="picture icon" class="profile_picture-icon" style="width: 16px; height: 16px;">
                    <span>6 постов</span>
                </div>
                <div class="profile__gallery">
                    <img src="../img/picture-post1.png" alt="first post" class="profile__gallery-item" style="width: 322.35px; height: 322.35px;">
                    <img src="../img/picture-post2.jpg" alt="second post" class="profile__gallery-item" style="width: 322.35px; height: 322.35px;">
                    <img src="../img/picture-post3.png" alt="third post" class="profile__gallery-item" style="width: 322.35px; height: 322.35px;">
                    <img src="../img/picture-post4.png" alt="fourth post" class="profile__gallery-item" style="width: 322.35px; height: 322.35px;">
                    <img src="../img/picture-post5.png" alt="fifth post" class="profile__gallery-item" style="width: 322.35px; height: 322.35px;">
                    <img src="../img/picture-post6.png" alt="sixth post" class="profile__gallery-item" style="width: 322.35px; height: 322.35px;">
                </div>
            </div>
        </div>
    </body>
</html>
