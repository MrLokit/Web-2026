<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Профиль</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="profile-page">
    <nav>
        <img src="../img/sidebar.png" alt="sidebar" class="sidebar">
    </nav>

    <div class="profile">
        <img src="../img/avatar1.png" alt="Profile photo" class="profile__photo">
        <h1 class="profile__name">Ваня Денисов</h1>
        <p class="profile__description">Привет! Я системный аналитик в ACME :) Тут моя жизнь только для самых классных!</p>
        <div class="profile__post-counter">   
            <img src="../img/picture-icon.png" alt="" class="profile_picture-icon">
            <span>6 постов</span>
        </div>
        <div class="profile__gallery">
            <img src="../img/picture-post1.png" alt="first post" class="profile__gallery-item">
            <img src="../img/picture-post2.jpg" alt="second post" class="profile__gallery-item">
            <img src="../img/picture-post3.png" alt="third post" class="profile__gallery-item">
            <img src="../img/picture-post4.png" alt="fourth post" class="profile__gallery-item">
            <img src="../img/picture-post5.png" alt="fifth post" class="profile__gallery-item">
            <img src="../img/picture-post6.png" alt="sixth post" class="profile__gallery-item">
        </div>
    </div>
</div>

</body>
</html>
