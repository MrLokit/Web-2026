<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Лента</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="feed-page">
    <nav>
        <img src="../img/sidebar.png" alt="sidebar" class="sidebar">
    </nav>
    <div class="feed">
        <div class="post">
            <div class="post__header">
                <img src="../img/avatar1.png" alt="avatar" class="post__avatar" >
                <span class="post__author">Ваня Денисов</span>
                <img src="../img/edit.png" alt="edit" class="post__edit">
            </div>
            <img src="../img/picture-post1.png" alt="" class="post__image">
            <img src="../img/reactions.png" alt="" class="post__reactions">
            <div class="post__footer">
                <span class="post__discription">Так красиво сегодня на улице! Настоящая зима)) Вспоминается Бродский: 
                «Поздно ночью, в уснувшей долине, на самом дне, в гор 
                <!--- одке, занесенном снегом по ручку двери...»---> </span>
                <span class="post__more">еще</span>
                <p class="post__time">2 часа назад.</p>
            </div>
        </div>
        <div class="post">
            <div class="post__header">
                <img src="../img/avatar2.png" alt="avatar" class="post__avatar" >
                <span class="post__author">Лиза Дёмина</span>
            </div>

            <img src="../img/picture-post2.jpg" alt="" class="post__image">
        </div>
    </div>
</div>

</body>
</html>
