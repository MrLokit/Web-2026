<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лента</title>
    <link rel="stylesheet" href="../src/styles/home.css">
</head>
<body>
    <nav class="navigation">
        <div class="navigation__item">
            <a href="../home/index.html"><img src="../img/icon_home_active.png" alt="Главная"></a>
        </div>
        <div class="navigation__item">
            <a href="../profile/index.html"><img src="../img/icon_profile.png" alt="Профиль"></a>
        </div>
        <div class="navigation__item">
            <a href="#"><img src="../img/icon_add.png" alt="Добавить"></a>
        </div>
    </nav>
    <main class="posts">
        <article class="post">
            <div class="post__header">
                <img src="../img/avatar1.png" alt="Аватар Вани" class="post__avatar">
                <span class="post__author">Ваня Денисов</span>
                <button class="post__edit" aria-label="Редактировать">
                    <img src="../img/edit.png" alt="Редактировать">
                </button>
            </div>
            <div class="post__image">
                <img src="../img/picture-post1.png" alt="Фото поста">
            </div>
            <div class="post__reactions">
                <button class="like-btn">
                    <img src="../img/love_reaction.png" alt="Нравится" class="like-icon">
                    <span>203</span>
                </button>
            </div>
            <div class="post__description">
                <p>Так красиво сегодня на улице! Настоящая зима)) Вспоминается Бродский: «Поздно ночью, в уснувшей долине, на самом дне, в гор... <!--оде, занесенном снегом по ручку двери...»--></p>
                <button class="post__more">ещё</button>
            </div>
            <div class="post__date">2 часа назад</div>
        </article>
        <article class="post">
            <div class="post__header">
                <img src="../img/avatar2.png" alt="Аватар Лизы" class="post__avatar">
                <span class="post__author">Лиза Дёмина</span>
            </div>
            <div class="post__image">
                <img src="../img/picture-post2.jpg" alt="Фото поста">
            </div>
        </article>
    </main>
</body>
</html>
